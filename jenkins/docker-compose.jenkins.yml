version: "3.9"

# ── Jenkins local (WSL2 / Docker Desktop) ────────────────────────────────────
# Usage : docker-compose -f docker-compose.jenkins.yml up -d
# UI    : http://localhost:8080
# Mot de passe initial : docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"       # UI Jenkins
      - "50000:50000"     # Port agents JNLP
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-Docker (DinD)
      - ~/.kube:/var/jenkins_home/.kube:ro           # kubeconfig EKS
      - ~/.aws:/var/jenkins_home/.aws:ro             # credentials AWS
    networks:
      - devops-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  jenkins-data:

networks:
  devops-net:
    external: true       # Réseau partagé avec le docker-compose principal
    name: devops-project_devops-net
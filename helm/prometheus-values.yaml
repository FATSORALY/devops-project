prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 50m
        memory: 150Mi
      limits:
        cpu: 100m
        memory: 300Mi
    retention: 12h
    replicas: 1

grafana:
  enabled: true
  resources:
    requests:
      cpu: 30m
      memory: 80Mi
    limits:
      cpu: 80m
      memory: 150Mi
  persistence:
    enabled: false

alertmanager:
  enabled: false

prometheusOperator:
  resources:
    requests:
      cpu: 20m
      memory: 50Mi

kubeStateMetrics:
  enabled: false

nodeExporter:
  enabled: false

defaultRules:
  create: false
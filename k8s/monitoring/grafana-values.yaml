adminPassword: "GrafanaAdmin123!"

persistence:
  enabled: true
  size: 2Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "30s"

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: DevOps
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

# Dashboards pré-installés (ID depuis grafana.com)
dashboards:
  default:
    kubernetes-cluster:
      gnetId: 7249    # Kubernetes Cluster
      revision: 1
      datasource: Prometheus
    node-exporter:
      gnetId: 1860    # Node Exporter Full
      revision: 37
      datasource: Prometheus
    kubernetes-pods:
      gnetId: 6417    # Kubernetes Pods
      revision: 1
      datasource: Prometheus

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

service:
  type: ClusterIP

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  path: /
  pathType: Prefix
